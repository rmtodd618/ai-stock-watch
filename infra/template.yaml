AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  ai-stock-watch — scheduled Lambda that scores a watchlist and emails a
  daily signal report via SES, with optional S3 archival.

Parameters:
  ReportSender:
    Type: String
    Description: Verified SES sender email address.
  ReportRecipient:
    Type: String
    Description: Comma-separated recipient email address(es).
  Schedule:
    Type: String
    Default: "cron(0 22 ? * MON-FRI *)"
    Description: EventBridge schedule (default 22:00 UTC, weekdays).
  EmailEnabled:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Whether the function should send email (vs. dry run in logs).
  EarningsGuardEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable the earnings-proximity guard (free; no key needed).
  MacroOverlayEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable the macro/theme regime overlay (free; no key needed).
  NewsSentimentEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable Claude news sentiment. Requires the SSM param below to exist.
  AnthropicApiKeySsmParam:
    Type: String
    Default: "/ai-stock-watch/anthropic-api-key"
    Description: >
      Name of the SSM SecureString parameter holding the Anthropic API key. The
      function reads and decrypts it at runtime — the key value never enters the
      template, CloudFormation, or the Lambda environment. Create it once with:
      aws ssm put-parameter --name /ai-stock-watch/anthropic-api-key
      --type SecureString --value sk-ant-...

Globals:
  Function:
    # Headroom for the news-sentiment layer (one Claude call per ticker, run
    # sequentially). Billed on actual duration, so the ceiling is free if unused.
    Timeout: 300
    MemorySize: 512
    Runtime: python3.12

Resources:
  ReportBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldReports
            Status: Enabled
            ExpirationInDays: 90

  StockWatchFunction:
    Type: AWS::Serverless::Function
    Metadata:
      # Explicit Makefile build: installs Linux wheels and copies only src/ +
      # config into the artifact. Requires `sam build --use-container`.
      BuildMethod: makefile
    Properties:
      Handler: src/handler.lambda_handler
      CodeUri: ../
      Architectures:
        - x86_64
      Description: Scores the watchlist and emails the daily report.
      Environment:
        Variables:
          REPORT_SENDER: !Ref ReportSender
          REPORT_RECIPIENT: !Ref ReportRecipient
          REPORT_BUCKET: !Ref ReportBucket
          EMAIL_ENABLED: !Ref EmailEnabled
          EARNINGS_GUARD_ENABLED: !Ref EarningsGuardEnabled
          MACRO_OVERLAY_ENABLED: !Ref MacroOverlayEnabled
          NEWS_SENTIMENT_ENABLED: !Ref NewsSentimentEnabled
          ANTHROPIC_API_KEY_SSM_PARAM: !Ref AnthropicApiKeySsmParam
      Policies:
        - Statement:
            - Sid: SendReportEmail
              Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
        - S3CrudPolicy:
            BucketName: !Ref ReportBucket
        - Statement:
            - Sid: ReadAnthropicKey
              Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AnthropicApiKeySsmParam}"
            - Sid: DecryptAnthropicKey
              Effect: Allow
              Action: kms:Decrypt
              Resource: "*"
              Condition:
                StringEquals:
                  kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: !Ref Schedule
            Description: Daily watchlist report trigger.

Outputs:
  FunctionName:
    Value: !Ref StockWatchFunction
  ReportBucketName:
    Value: !Ref ReportBucket
